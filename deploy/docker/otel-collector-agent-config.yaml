receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog/docker:
    include:
      - /var/lib/docker/containers/*/*-json.log
    poll_interval: 5s
    start_at: end
    include_file_path: false
    include_file_name: false
    operators:
      - id: extract_body
        type: json_parser
        parse_from: body
        parse_to: attributes
        on_error: drop
      - id: extract_log
        type: json_parser
        parse_from: attributes.log
        parse_to: attributes
        on_error: send
  prometheus:
    config:
      scrape_configs:
        - job_name: opentelemetry-collector-agent
          scrape_interval: 1s
          static_configs:
            - targets: [
              0.0.0.0:8888
            ]
        - job_name: node-exporter
          scrape_interval: 1s
          static_configs:
            - targets: [
              'node-exporter:9100'
            ]
        - job_name: cadvisor
          static_configs:
            - targets: [
              'cadvisor:8080'
            ]

processors:
  batch:

exporters:
  otlp_http/gateway:
    endpoint: http://opentelemetry-collector-gateway:4318
    tls:
      insecure: true
  otlp_grpc/gateway:
    endpoint: http://opentelemetry-collector-gateway:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    logs:
      receivers: [ otlp, filelog/docker ]
      processors: [ batch ]
      exporters: [ otlp_grpc/gateway ]
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp_grpc/gateway ]
    metrics:
      receivers: [ otlp, prometheus ]
      processors: [ batch ]
      exporters: [ otlp_grpc/gateway ]
