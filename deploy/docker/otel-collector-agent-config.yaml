receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: opentelemetry-collector-agent
          scrape_interval: 5s
          static_configs:
            - targets: [ 0.0.0.0:8888 ]

processors:
  batch:

exporters:
  otlp_http/gateway:
    endpoint: http://opentelemetry-collector-gateway:4318
    tls:
      insecure: true
  otlp_grpc/gateway:
    endpoint: http://opentelemetry-collector-gateway:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [ health_check, pprof, zpages ]
  pipelines:
    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp_grpc/gateway ]
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp_grpc/gateway ]
    metrics:
      receivers: [ otlp, prometheus ]
      processors: [ batch ]
      exporters: [ otlp_grpc/gateway ]
