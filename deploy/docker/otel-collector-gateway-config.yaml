receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp_http/seq_logs:
    endpoint: http://seq:5341/ingest/otlp
    tls:
      insecure: true
  otlp_http/seq_traces:
    endpoint: http://seq:5341/ingest/otlp/v1/traces
    tls:
      insecure: true
  otlp_grpc/jaeger:
    endpoint: http://jaeger:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [ health_check, pprof, zpages ]
  pipelines:
    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp_http/seq_logs ]
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp_grpc/jaeger, otlp_http/seq_traces ]
    metrics:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ prometheus ]
